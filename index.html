<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹디자인기능사 실기 코드북 v2 - A~F 유형</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8eaf0;
  --muted: #8b90a0;
  --accent: #7c6bff;
  --accent2: #a78bfa;
  --green: #4ade80;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --pink: #f472b6;
  --teal: #2dd4bf;
  --orange: #fb923c;

  /* syntax colors */
  --syn-comment: #5c6370;
  --syn-keyword: #c792ea;
  --syn-string: #98c379;
  --syn-number: #f78c6c;
  --syn-selector: #61afef;
  --syn-property: #e06c75;
  --syn-value: #98c379;
  --syn-tag: #e06c75;
  --syn-attr: #d19a66;
  --syn-punct: #abb2bf;
  --syn-function: #61afef;
  --syn-var: #e5c07b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── 헤더 ─── */
.app-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 28px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.app-logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: -0.3px;
}
.app-logo span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
.mode-btns {
  margin-left: auto;
  display: flex;
  gap: 6px;
}
.mode-btn {
  padding: 6px 16px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}
.mode-btn.active, .mode-btn:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ─── 레이아웃 ─── */
.app-body { display: flex; height: calc(100vh - 61px); }

/* 사이드바 */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
}
.sidebar-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 0 18px 8px;
}
.type-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.type-item:hover { background: rgba(255,255,255,0.04); }
.type-item.active {
  background: rgba(124,107,255,0.12);
  border-left-color: var(--accent);
}
.type-dot {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.type-item-info { flex: 1; min-width: 0; }
.type-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
.type-item-sub { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.diff-pill {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 99px;
  font-weight: 600;
}

/* ─── 메인 ─── */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
.code-wrap-inner { display: flex; flex: 1; overflow: hidden; }

/* 유형 정보 배너 */
.type-banner {
  padding: 16px 24px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
}
.banner-badge {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800;
  flex-shrink: 0;
}
.banner-title { font-size: 17px; font-weight: 700; }
.banner-desc { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.banner-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.banner-tag {
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 99px;
  border: 1px solid var(--border2);
  color: var(--muted);
}

/* 코드 탭 */
.code-tabs {
  display: flex;
  gap: 0;
  padding: 0 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.c-tab {
  padding: 11px 20px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.c-tab:hover { color: var(--text); }
.c-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
.c-tab .tab-dot { width: 7px; height: 7px; border-radius: 50%; }

/* 코드 영역 */
.code-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.code-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 24px;
  background: #1e2130;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
}
/* 상단 가로 스크롤바 */
.code-scroll-top {
  overflow-x: scroll;
  overflow-y: hidden;
  background: #1a1d2e;
  height: 10px;
  flex-shrink: 0;
}
.code-scroll-top-inner {
  height: 1px;
}
.code-scroll-top::-webkit-scrollbar { height: 8px; }
.code-scroll-top::-webkit-scrollbar-track { background: #1a1d2e; }
.code-scroll-top::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.copy-btn {
  padding: 4px 14px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.code-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: scroll;
  background: #1e2130;
  min-width: 0;
}
.code-scroll::-webkit-scrollbar { width: 6px; height: 8px; }
.code-scroll::-webkit-scrollbar-track { background: #1a1d2e; }
.code-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.code-inner {
  display: flex;
  min-width: max-content;
}
.line-nums {
  padding: 20px 0;
  text-align: right;
  user-select: none;
  background: #1a1d2e;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.line-num {
  display: block;
  padding: 0 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  color: #3d4260;
}
.code-content {
  padding: 20px 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  white-space: pre;
  flex: 1;
}
/* syntax highlighting classes */
.cm { color: var(--syn-comment); font-style: italic; }
.kw { color: var(--syn-keyword); font-weight: 500; }
.st { color: var(--syn-string); }
.nm { color: var(--syn-number); }
.tg { color: var(--syn-tag); }
.at { color: var(--syn-attr); }
.sl { color: var(--syn-selector); }
.pr { color: var(--syn-property); }
.vl { color: var(--syn-value); }
.fn { color: var(--syn-function); }
.vr { color: var(--syn-var); }
.pt { color: var(--syn-punct); }

/* ─── 포인트 패널 ─── */
.points-panel {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.points-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.point-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.point-card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 4px;
}
.point-card-body { font-size: 12px; color: var(--muted); line-height: 1.6; }
.point-card-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--syn-string);
  background: rgba(255,255,255,0.04);
  padding: 4px 8px;
  border-radius: 4px;
  margin-top: 6px;
  display: block;
  white-space: pre;
}

/* ─── 암기 모드 ─── */
#memoryMode { display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 24px; overflow-y: auto; }
#memoryMode.show { display: flex; }
.memory-header { text-align: center; margin-bottom: 28px; }
.memory-header h2 { font-size: 22px; font-weight: 700; color: var(--text); }
.memory-header p { font-size: 14px; color: var(--muted); margin-top: 6px; }

.memory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; width: 100%; max-width: 860px; }

.mem-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.mem-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 14px 14px 0 0;
}
.mem-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.mem-card.flipped .mem-front { display: none; }
.mem-card.flipped .mem-back { display: block; }
.mem-front, .mem-back { }
.mem-back { display: none; }
.mem-card-type { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.mem-card-q { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
.mem-card-hint { font-size: 11px; color: var(--muted); }
.mem-card-a { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 8px; }
.mem-card-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: rgba(255,255,255,0.05);
  padding: 8px 10px;
  border-radius: 6px;
  color: var(--syn-string);
  white-space: pre;
}
.mem-flip-hint {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  margin-top: 8px;
  opacity: 0.6;
}
.mem-reset {
  margin-top: 20px;
  padding: 10px 28px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
}
.mem-reset:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ─── 퀴즈 모드 ─── */
#quizMode { display: none; flex-direction: column; align-items: center; padding: 32px 24px; overflow-y: auto; }
#quizMode.show { display: flex; }
.quiz-wrap { width: 100%; max-width: 640px; }
.quiz-progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.quiz-progress-label { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.quiz-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 14px;
}
.quiz-badge {
  display: inline-block;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  font-weight: 600;
  margin-bottom: 12px;
}
.quiz-q { font-size: 16px; font-weight: 600; line-height: 1.6; margin-bottom: 8px; }
.quiz-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: #1e2130;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 16px;
  line-height: 1.7;
  white-space: pre;
}
.quiz-opts { display: grid; gap: 8px; }
.quiz-opt {
  padding: 11px 16px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  background: transparent;
  text-align: left;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.quiz-opt:hover:not(.correct):not(.wrong) { background: rgba(255,255,255,0.05); border-color: var(--accent); }
.quiz-opt.correct { background: rgba(74,222,128,0.12); border-color: var(--green); color: var(--green); }
.quiz-opt.wrong { background: rgba(248,113,113,0.12); border-color: var(--red); color: var(--red); }
.quiz-opt.disabled { cursor: default; }
.quiz-fb {
  margin-top: 12px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
  display: none;
}
.quiz-fb.show { display: block; }
.quiz-fb.ok { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.3); color: #86efac; }
.quiz-fb.fail { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
.quiz-nav { display: flex; gap: 8px; margin-top: 6px; }
.quiz-next {
  padding: 10px 24px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  display: none;
}
.quiz-next:hover { opacity: 0.85; }
.score-screen {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  text-align: center;
  width: 100%;
}
.score-big { font-size: 52px; font-weight: 800; color: var(--accent2); }
.score-pct { font-size: 18px; color: var(--muted); margin: 4px 0 16px; }
.score-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
.retry-btn {
  padding: 12px 32px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
}
.retry-btn:hover { opacity: 0.85; }

/* 스크롤바 */
.sidebar::-webkit-scrollbar, .points-panel::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb, .points-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ─── 모바일 유형 선택 드롭다운 ─── */
.mobile-type-select {
  display: none;
  padding: 10px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.mobile-type-select select {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
}

/* ─── 모바일 반응형 ─── */
@media (max-width: 768px) {
  .app-header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
  .app-logo { font-size: 14px; }
  .app-logo span { display: none; }
  .mode-btns { gap: 4px; }
  .mode-btn { padding: 5px 10px; font-size: 11px; }

  .app-body { height: auto; flex-direction: column; }
  .sidebar { display: none !important; }
  .mobile-type-select { display: block; }

  #codeMode { display: flex; flex-direction: column; }
  .type-banner { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
  .banner-badge { width: 36px; height: 36px; font-size: 18px; }
  .banner-title { font-size: 14px; }
  .banner-desc { font-size: 12px; }
  .banner-tags { display: none; }

  .code-tabs { padding: 0 12px; overflow-x: auto; white-space: nowrap; }
  .c-tab { padding: 10px 14px; font-size: 12px; }

  .code-wrap-inner { flex-direction: column !important; overflow: visible !important; height: auto !important; }

  .code-section { min-height: 400px; }
  .code-scroll { height: 400px; overflow-x: auto !important; overflow-y: auto !important; }
  .code-content { font-size: 11px; }
  .line-num { font-size: 11px; }
  .code-toolbar { padding: 6px 12px; font-size: 11px; }

  .points-panel { width: 100% !important; border-left: none !important; border-top: 1px solid var(--border); max-height: none; padding: 12px; display: none; }
  .points-panel.mobile-open { display: flex; }

  /* 핵심 포인트 토글 버튼 */
  .mobile-points-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg3);
    border-top: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    user-select: none;
  }
  .mobile-points-toggle .toggle-arrow {
    font-size: 12px;
    transition: transform 0.2s;
  }
  .mobile-points-toggle.open .toggle-arrow {
    transform: rotate(180deg);
  }

  .memory-grid { grid-template-columns: 1fr !important; }
  #memoryMode { padding: 20px 16px; }
  #quizMode { padding: 20px 16px; }
  .quiz-wrap { width: 100%; }
  .quiz-q { font-size: 14px; }
  .quiz-opt { font-size: 13px; }
}

/* 토글 버튼 PC에서 숨기기 */
.mobile-points-toggle { display: none; }
@media (max-width: 768px) {
  .mobile-points-toggle { display: flex; }
}

/* ─── 연습 모드 ─── */
#practiceMode {
  display: none;
  flex: 1;
  height: calc(100vh - 61px);
  overflow: hidden;
}
#practiceMode.show { display: flex; }

.practice-body {
  display: flex;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* 왼쪽 참고 코드 */
.practice-ref {
  width: 50%;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.practice-ref-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  flex-shrink: 0;
}
.practice-ref-header select {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 3px 8px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
}
.practice-ref-tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  flex-shrink: 0;
}
.practice-ref-tab {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  border: none;
  background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.practice-ref-tab.active { color: var(--accent2); border-bottom: 2px solid var(--accent); }
.practice-ref-scroll {
  flex: 1;
  overflow: auto;
  background: #1e2130;
}
.practice-ref-code {
  padding: 16px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.8;
  white-space: pre;
  color: var(--text);
}

/* 오른쪽 에디터 + 미리보기 */
.practice-right {
  width: 50%;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.practice-editor-area {
  height: 55%;
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.practice-editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

a { text-decoration: none; color: inherit; }

.wrap {

  display: flex;

  justify-content: space-between;
  height: 80px;
  padding: 0 20px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}
.logo a { font-size: 24px; font-weight: bold; }

/* ══ 수평 메뉴 ══ */
.gnb .menu { display: flex; }

  display: block;
  padding: 0 20px;
  line-height: 80px;

  background: #fff;
  border: 1px solid #ddd;

}

function renderType(k) {
  curType = k;

// ─── 신택스 하이라이팅 ───
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(code, type) {
  var esc = escHtml(code);
  if(type === 'html') return highlightHTML(esc);
  if(type === 'css') return highlightCSS(esc);
  if(type === 'js') return highlightJS(esc);
  return esc;
}

function highlightHTML(s) {
  // 주석
  s = s.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="cm">$1</span>');
  // 태그
  s = s.replace(/(&lt;\/?)([\w!-]+)([\s\S]*?)(&gt;)/g, function(m, open, tag, rest, close){
    var attrs = rest.replace(/([\w-]+)(=)(&quot;[^&]*&quot;|'[^']*'|\S+)/g,
      '<span class="at">$1</span><span class="pt">$2</span><span class="st">$3</span>');
    return '<span class="pt">' + open + '</span><span class="tg">' + tag + '</span>' + attrs + '<span class="pt">' + close + '</span>';
  });
  return s;
}

function highlightCSS(s) {
  // 주석
  s = s.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="cm">$1</span>');
  // 선택자 + { ... }
  s = s.replace(/([#.a-zA-Z][^{}\n]*?)(\{)/g, '<span class="sl">$1</span><span class="pt">$2</span>');
  s = s.replace(/(\})/g, '<span class="pt">$1</span>');
  // 속성: 값
  s = s.replace(/([a-zA-Z-]+)(\s*:\s*)([^;{}\n<]+)(;)/g,
    '<span class="pr">$1</span><span class="pt">$2</span><span class="vl">$3</span><span class="pt">$4</span>');
  return s;
}

function highlightJS(s) {
  // 주석 (한줄)
  s = s.replace(/(\/\/[^\n]*)/g, '<span class="cm">$1</span>');
  // 키워드
  var kws = ['function','var','let','const','if','else','return','for','while','new','true','false','null','undefined'];
  kws.forEach(function(k){
    s = s.replace(new RegExp('\\b(' + k + ')\\b', 'g'), '<span class="kw">$1</span>');
  });
  // 문자열
  s = s.replace(/(&quot;[^&]*&quot;)/g, '<span class="st">$1</span>');
  s = s.replace(/(&#39;[^&#]*&#39;)/g, '<span class="st">$1</span>');
  // 숫자
  s = s.replace(/\b(\d+)\b/g, '<span class="nm">$1</span>');
  // jQuery $
  s = s.replace(/(\$)/g, '<span class="fn">$1</span>');
  return s;
}

function initQuiz() {
  qIdx = 0; qScore = 0; qAnswered = false;
  renderQuiz();
}

function renderQuiz() {
  var area = document.getElementById('quizArea');
  var fill = document.getElementById('qProgress');
  var label = document.getElementById('qLabel');

  if(qIdx >= QUIZ.length) {
    var pct = Math.round(qScore / QUIZ.length * 100);
    var msgs = ['암기 카드부터 다시 봐요! 포기하지 마요 💪','절반 왔어요! 조금만 더 하면 돼요 😊','거의 다 왔어요! 한번 더 하면 만점 🔥','완벽해요! 시험 합격 확실 🎉'];
    var mi = Math.min(Math.floor(pct/25), 3);
    fill.style.width = '100%';
    label.textContent = '완료!';
    area.innerHTML = '<div class="score-screen">' +
      '<div class="score-big">' + qScore + ' / ' + QUIZ.length + '</div>' +
      '<div class="score-pct">' + pct + '점</div>' +
      '<div class="score-msg">' + msgs[mi] + '</div>' +
      '<button class="retry-btn" onclick="initQuiz()">다시 풀기</button>' +
    '</div>';
    return;
  }

  fill.style.width = (qIdx / QUIZ.length * 100) + '%';
  label.textContent = '문제 ' + (qIdx+1) + ' / ' + QUIZ.length;

  var q = QUIZ[qIdx];
  qAnswered = false;

  var optsHtml = q.opts.map(function(o, i){
    return '<button class="quiz-opt" onclick="answerQuiz(' + i + ')" id="qo' + i + '">' + escHtml(o) + '</button>';
  }).join('');

  area.innerHTML = '<div class="quiz-card">' +
    '<span class="quiz-badge" style="background:' + getTypeColor(q.type) + '22;color:' + getTypeColor(q.type) + '">' + q.type + '</span>' +
    '<div class="quiz-q">' + escHtml(q.q) + '</div>' +
    (q.code ? '<div class="quiz-code">' + highlightJS(escHtml(q.code)) + '</div>' : '') +
    '<div class="quiz-opts">' + optsHtml + '</div>' +
    '<div class="quiz-fb" id="qfb"></div>' +
  '</div>' +
  '<div class="quiz-nav"><button class="quiz-next" id="qnext" onclick="nextQuestion()">다음 문제 →</button></div>';
}

function getTypeColor(type) {
  var map = {'A유형':'#4ade80','B유형':'#60a5fa','C유형':'#fbbf24','D유형':'#f87171','E유형':'#c792ea','F유형':'#f472b6','공통 JS':'#2dd4bf','슬라이드':'#fb923c','슬라이드 3-1':'#fb923c','슬라이드 3-2':'#a78bfa','슬라이드 3-3':'#f472b6','공통':'#2dd4bf'};
  return map[type] || '#8b90a0';
}

function answerQuiz(i) {
  if(qAnswered) return;
  qAnswered = true;
  var q = QUIZ[qIdx];
  document.querySelectorAll('.quiz-opt').forEach(function(o){ o.classList.add('disabled'); });
  var selected = document.getElementById('qo' + i);
  var correct = document.getElementById('qo' + q.ans);
  selected.classList.add(i === q.ans ? 'correct' : 'wrong');
  if(i !== q.ans) correct.classList.add('correct');
  var fb = document.getElementById('qfb');
  fb.className = 'quiz-fb show ' + (i === q.ans ? 'ok' : 'fail');
  fb.innerHTML = (i === q.ans ? '✓ 정답! ' : '✗ 오답. ') + q.fb;
  if(i === q.ans) qScore++;
  document.getElementById('qnext').style.display = 'block';
}

function nextQuestion() { qIdx++; renderQuiz(); }

// ─── 에디터 자동완성 ───

// emmet 축약어 목록
var emmetMap = {
  // HTML 구조
  '!':        '<!DOCTYPE html>\n<html lang="ko">\n<head>\n  <meta charset="UTF-8">\n  <title>Document</title>\n</head>\n<body>\n  \n</body>\n</html>',
  'wrap':     '<div class="wrap">\n  \n</div>',
  'header':   '<header class="header">\n  \n</header>',
  'nav':      '<nav class="gnb">\n  \n</nav>',
  'ul':       '<ul>\n  <li></li>\n</ul>',
  'li':       '<li></li>',
  'section':  '<section class="">\n  \n</section>',
  'div':      '<div class="">\n  \n</div>',
  'footer':   '<footer class="footer">\n  \n</footer>',
  'a':        '<a href="#"></a>',
  'img':      '<img src="" alt="">',
  'input':    '<input type="text" placeholder="">',
  'button':   '<button class=""></button>',
  'h1':       '<h1></h1>',
  'h2':       '<h2></h2>',
  'p':        '<p></p>',
  'span':     '<span></span>',
  // CSS 자주 쓰는 것
  'df':       'display: flex;',
  'dib':      'display: inline-block;',
  'dn':       'display: none;',
  'db':       'display: block;',
  'pf':       'position: fixed;',
  'pa':       'position: absolute;',
  'pr':       'position: relative;',
  'ma':       'margin: 0 auto;',
  'tac':      'text-align: center;',
  'w100':     'width: 100%;',
  'h100':     'height: 100%;',
  'fl':       'float: left;',
  'fr':       'float: right;',
};

// 괄호/따옴표 자동 닫기 쌍
var autoPairs = {
  '{': '}',
  '(': ')',
  '[': ']',
  '"': '"',
  "'": "'"
};

// 자동 닫히는 HTML 태그 (self-closing 제외)
var selfClosingTags = ['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr'];

function handleEditorKey(e) {
  var ta = document.getElementById('practiceEditor');
  var start = ta.selectionStart;
  var end = ta.selectionEnd;
  var val = ta.value;

  // Tab → 들여쓰기 or Emmet 처리
  if(e.key === 'Tab') {
    e.preventDefault();
    // 현재 줄에서 커서 앞 단어 추출 (! 포함)
    var lineStart = val.lastIndexOf('\n', start - 1) + 1;
    var word = val.slice(lineStart, start).trim();
    if(emmetMap[word] && practiceEditorTab === 'html') {
      var expanded = emmetMap[word];
      var before = val.slice(0, lineStart);
      var after = val.slice(end);
      // 커서를 빈 줄 위치에
      var cursorOffset = expanded.indexOf('\n  \n');
      var cursorPos = before.length + (cursorOffset !== -1 ? cursorOffset + 4 : expanded.length);
      ta.value = before + expanded + after;
      ta.selectionStart = ta.selectionEnd = cursorPos;
    } else if(emmetMap[word] && practiceEditorTab === 'css') {
      var expanded = emmetMap[word];
      var before = val.slice(0, lineStart);
      var after = val.slice(end);
      ta.value = before + expanded + after;
      ta.selectionStart = ta.selectionEnd = before.length + expanded.length;
    } else {
      // 일반 들여쓰기
      ta.value = val.slice(0, start) + '  ' + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 2;
    }
    practiceCode[practiceEditorTab] = ta.value;
    autoRun();
    return;
  }

  // 괄호/따옴표 자동 닫기
  if(autoPairs[e.key] && start === end) {
    e.preventDefault();
    var close = autoPairs[e.key];
    ta.value = val.slice(0, start) + e.key + close + val.slice(end);
    ta.selectionStart = ta.selectionEnd = start + 1;
    practiceCode[practiceEditorTab] = ta.value;
    return;
  }

  // 닫는 괄호/따옴표 위에서 그냥 넘어가기
  var closers = Object.values(autoPairs);
  if(closers.indexOf(e.key) !== -1 && val[start] === e.key && start === end) {
    e.preventDefault();
    ta.selectionStart = ta.selectionEnd = start + 1;
    return;
  }

  // HTML 태그 자동 닫기
  if(e.key === '>' && practiceEditorTab === 'html') {
    var before2 = val.slice(0, start);
    var tagMatch = before2.match(/<(\w+)([^>]*)$/);
    if(tagMatch) {
      var tagName = tagMatch[1].toLowerCase();
      if(selfClosingTags.indexOf(tagName) === -1 && tagMatch[2].slice(-1) !== '/') {
        e.preventDefault();
        var closeTag = '</' + tagName + '>';
        ta.value = val.slice(0, start) + '>' + closeTag + val.slice(end);
        ta.selectionStart = ta.selectionEnd = start + 1;
        practiceCode[practiceEditorTab] = ta.value;
        autoRun();
        return;
      }
    }
  }

  // Enter 후 자동 들여쓰기
  if(e.key === 'Enter') {
    e.preventDefault();
    var lineStart2 = val.lastIndexOf('\n', start - 1) + 1;
    var currentLine = val.slice(lineStart2, start);
    var indent = currentLine.match(/^(\s*)/)[1];
    // { 로 끝나면 들여쓰기 추가
    if(currentLine.trimEnd().slice(-1) === '{') {
      var nextChar = val[start];
      if(nextChar === '}') {
        var ins = '\n' + indent + '  ' + '\n' + indent;
        ta.value = val.slice(0, start) + ins + val.slice(end);
        ta.selectionStart = ta.selectionEnd = start + indent.length + 3;
      } else {
        ta.value = val.slice(0, start) + '\n' + indent + '  ' + val.slice(end);
        ta.selectionStart = ta.selectionEnd = start + indent.length + 3;
      }
    } else {
      ta.value = val.slice(0, start) + '\n' + indent + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + indent.length + 1;
    }
    practiceCode[practiceEditorTab] = ta.value;
    autoRun();
  }
}
